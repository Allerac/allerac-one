# Allerac One - Cloud Services Line
# Managed deployment for allerac.cloud (Starter, Personal, Pro)
#
# Required environment variables (must be set — startup fails without them):
#   ENCRYPTION_KEY                - AES key for encrypting user tokens at rest
#   TELEGRAM_TOKEN_ENCRYPTION_KEY - AES key for encrypting Telegram bot tokens
#   TUNNEL_TOKEN                  - Cloudflare Tunnel token (Zero Trust dashboard)
#   GRAFANA_PASSWORD              - Grafana admin password
#
# Optional:
#   GITHUB_TOKEN        - GitHub Models API token (primary LLM; users can also set their own)
#   TAVILY_API_KEY      - Web search API key
#   EXECUTOR_SECRET     - Secret for executor service auth
#   OLLAMA_MODELS       - Comma-separated models to download (used with --profile ollama)
#   NOTIFIER_LLM_MODEL  - Model for notifier (default: qwen2.5:3b)
#   TELEGRAM_BOT_TOKEN  - Legacy single-bot token
#
# Ollama runs by default on the server (privacy-first, no inference data leaves the machine).

name: allerac

services:
  migrations:
    image: postgres:16-alpine
    container_name: allerac-migrations
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=allerac
    volumes:
      - ./src/database:/database
    command: ["/bin/sh", "/database/run-migrations.sh"]
    depends_on:
      db:
        condition: service_healthy

  executor:
    build:
      context: ./infra/executor
      dockerfile: Dockerfile
    container_name: allerac-executor
    restart: unless-stopped
    environment:
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
      - DEFAULT_CWD=/workspace
      - ALLERAC_PRODUCT_LINE=cloud
    volumes:
      - executor_workspace:/workspace
      # Docker socket for self-update (docker compose build/up)
      - /var/run/docker.sock:/var/run/docker.sock
      # Project directory so the agent can run update.sh
      - ${COMPOSE_DIR:-.}:/project
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMMIT_HASH: ${COMMIT_HASH:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: allerac-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/allerac
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=allerac
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      # Required: startup fails if not set
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - TELEGRAM_TOKEN_ENCRYPTION_KEY=${TELEGRAM_TOKEN_ENCRYPTION_KEY:?TELEGRAM_TOKEN_ENCRYPTION_KEY is required}
      # Primary LLM: GitHub Models API (users configure their own token in settings)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Ollama: containerized (--profile ollama) or host fallback
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - BACKUP_DIR=/app/backups
      # Executor service for shell tool
      - EXECUTOR_URL=http://executor:3001
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
      # Tells update.sh which compose file to use (local vs cloud)
      - ALLERAC_PRODUCT_LINE=cloud
    ports:
      - "8080:8080"
    volumes:
      - backups_data:/app/backups
      - ./update.sh:/app/update.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrations:
        condition: service_completed_successfully
      executor:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    container_name: allerac-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=allerac
    # Port NOT exposed externally — DB is internal only in cloud
    volumes:
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d allerac"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Ollama - Local LLM (always on, privacy-first)
  # Inference stays on the server — no data leaves the machine.
  # ============================================

  ollama:
    image: ollama/ollama:latest
    container_name: allerac-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    mem_limit: ${OLLAMA_MEM_LIMIT:-8g}
    # GPU support (uncomment for NVIDIA GPU on the cloud server):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

  ollama-setup:
    image: ollama/ollama:latest
    container_name: allerac-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_MODELS=${OLLAMA_MODELS:-qwen2.5:3b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling models: ${OLLAMA_MODELS:-qwen2.5:3b}"
        echo "${OLLAMA_MODELS:-qwen2.5:3b}" | tr ',' '\n' | while read model; do
          model=$$(echo "$$model" | tr -d ' ')
          [ -z "$$model" ] && continue
          if ollama list | grep -q "^$$model"; then
            echo "Model $$model already present, skipping."
          else
            echo "Pulling $$model..."
            ollama pull "$$model"
          fi
        done
        echo "Model setup complete!"
    restart: "no"

  # ============================================
  # Monitoring Stack
  # ============================================

  node-exporter:
    image: prom/node-exporter:latest
    container_name: allerac-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:latest
    container_name: allerac-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: allerac-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # Required: startup fails if not set
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki

  # Loki - Log aggregation
  loki:
    image: grafana/loki:latest
    container_name: allerac-loki
    restart: unless-stopped
    user: "0"  # Run as root to avoid permission issues with volumes
    volumes:
      - ./infra/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 256M

  # Promtail - Log shipping agent
  promtail:
    image: grafana/promtail:latest
    container_name: allerac-promtail
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # Telegram Bot
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    container_name: allerac-telegram
    restart: unless-stopped
    volumes:
      - ./telegram-bots.json:/app/telegram-bots.json:ro
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/allerac
      # Primary LLM: GitHub Models API
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      # Required: startup fails if not set
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - TELEGRAM_TOKEN_ENCRYPTION_KEY=${TELEGRAM_TOKEN_ENCRYPTION_KEY:?TELEGRAM_TOKEN_ENCRYPTION_KEY is required}
      # Legacy env vars (for backward compatibility with single-bot mode)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_DEFAULT_USER=${TELEGRAM_DEFAULT_USER:-}
      # Executor service for shell tool
      - EXECUTOR_URL=http://executor:3001
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrations:
        condition: service_completed_successfully
      executor:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # Portainer - Docker management UI
  # Cloudflare Zero Trust: add public hostname portainer.allerac.ai → http://localhost:9000
  portainer:
    image: portainer/portainer-ce:latest
    container_name: allerac-portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9000:9000"

  # Cloudflare Tunnel - Required for public access
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: allerac-tunnel
    restart: unless-stopped
    command: tunnel run
    network_mode: host
    environment:
      # Required: get token from Cloudflare Zero Trust dashboard (Networks > Tunnels)
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:?TUNNEL_TOKEN is required}
    depends_on:
      - app

  # Redis - Message broker for notification streams
  redis:
    image: redis:7-alpine
    container_name: allerac-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  # Notifier - Cron scheduler + Redis Stream consumers (Go)
  notifier:
    build:
      context: ./infra/notifier
      dockerfile: Dockerfile
    container_name: allerac-notifier
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/allerac
      - REDIS_URL=redis://redis:6379
      # Ollama: containerized (--profile ollama) or host fallback
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - NOTIFIER_LLM_MODEL=${NOTIFIER_LLM_MODEL:-qwen2.5:3b}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 128M

  # ============================================
  # Webhook — Auto-deploy on git push
  # GitHub → Settings → Webhooks → <tunnel>/hooks/deploy
  # ============================================
  webhook:
    build:
      context: ./infra/webhook
      dockerfile: Dockerfile
    container_name: allerac-webhook
    restart: unless-stopped
    ports:
      - "9999:9000"
    volumes:
      - ./infra/webhook:/etc/webhook:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_DIR:-.}:/project
    environment:
      # Required: generate with: openssl rand -hex 32
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      # Telegram deploy notifications (create bot via @BotFather)
      - TELEGRAM_DEPLOY_BOT_TOKEN=${TELEGRAM_DEPLOY_BOT_TOKEN:-}
      - TELEGRAM_DEPLOY_CHAT_ID=${TELEGRAM_DEPLOY_CHAT_ID:-}
      # Git authentication for git pull inside container
      - GITHUB_DEPLOY_TOKEN=${GITHUB_DEPLOY_TOKEN:-}
      # Human-readable name shown in deploy notifications
      - DEPLOY_VM_NAME=${DEPLOY_VM_NAME:-allerac-vm}
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  # Data volumes declared as external with fixed names so they survive
  # project renames and are never accidentally re-created empty.
  db_data:
    external: true
    name: allerac_db_data
  ollama_data:
    external: true
    name: allerac_ollama_data
  backups_data:
    external: true
    name: allerac_backups_data
  # Ephemeral / monitoring volumes — auto-created per project
  prometheus_data:
  grafana_data:
  loki_data:
  executor_workspace:
  redis_data:
  portainer_data:
