# Allerac One - Local Hardware Line
# For self-hosted AI on your own hardware (Allerac Lite, Home, Pro)
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#
# With notifications (Redis + Notifier + Telegram):
#   docker compose -f docker-compose.local.yml --profile notifications up -d
#
# With monitoring (optional):
#   docker compose -f docker-compose.local.yml --profile monitoring up -d
#
# Full stack (all profiles):
#   docker compose -f docker-compose.local.yml --profile notifications --profile monitoring up -d
#
# Hardware tier model presets (set OLLAMA_MODELS in .env):
#   Allerac Lite:  OLLAMA_MODELS=qwen2.5:3b
#   Allerac Home:  OLLAMA_MODELS=qwen2.5:3b
#   Allerac Pro:   OLLAMA_MODELS=qwen2.5:3b

services:
  # ============================================
  # CORE SERVICES
  # ============================================

  db:
    image: pgvector/pgvector:pg16
    container_name: allerac-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-allerac}
    volumes:
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-allerac}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Memory limits to prevent OOM on small devices
    deploy:
      resources:
        limits:
          memory: 512M

  migrations:
    image: postgres:16-alpine
    container_name: allerac-migrations
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-allerac}
    volumes:
      - ./src/database:/database
    command: ["/bin/sh", "/database/run-migrations.sh"]
    depends_on:
      db:
        condition: service_healthy

  executor:
    build:
      context: ./infra/executor
      dockerfile: Dockerfile
    container_name: allerac-executor
    restart: unless-stopped
    environment:
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
      - DEFAULT_CWD=/workspace
      - ALLERAC_PRODUCT_LINE=local
    volumes:
      # Give the agent access to the host home directory
      # Change HOST_WORKSPACE in .env to restrict or expand the scope
      - ${HOST_WORKSPACE:-/home}:/workspace
      # Docker socket for self-update (docker compose build/up)
      - /var/run/docker.sock:/var/run/docker.sock
      # Project directory so the agent can run update.sh
      - ${COMPOSE_DIR:-.}:/project
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMMIT_HASH: ${COMMIT_HASH:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: allerac-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-allerac}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-allerac}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - NEXT_PUBLIC_API_URL=http://localhost:${APP_PORT:-8080}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BACKUP_DIR=/app/backups
      # Optional external APIs (not required for local use)
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      # Executor service for shell tool
      - EXECUTOR_URL=http://executor:3001
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
      # Tells update.sh which compose file to use (local vs cloud)
      - ALLERAC_PRODUCT_LINE=local
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - backups_data:/app/backups
      - ./update.sh:/app/update.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrations:
        condition: service_completed_successfully
      executor:
        condition: service_healthy
    # Memory limits for stability
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # OLLAMA - Local LLM (required for local AI)
  # ============================================

  ollama:
    image: ollama/ollama:latest
    container_name: allerac-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    mem_limit: ${OLLAMA_MEM_LIMIT:-10g}
    # GPU support is handled via docker-compose.local.gpu.yml override.
    # install.sh enables it automatically when an NVIDIA GPU is detected.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

  # Model downloader - runs once to pull models for your hardware tier
  # Set OLLAMA_MODELS in .env as a comma-separated list:
  #   Allerac Lite:  OLLAMA_MODELS=qwen2.5:3b
  #   Allerac Home:  OLLAMA_MODELS=qwen2.5:3b
  #   Allerac Pro:   OLLAMA_MODELS=qwen2.5:3b
  ollama-setup:
    image: ollama/ollama:latest
    container_name: allerac-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
      # Comma-separated list of models to pull (defaults to Allerac Lite preset)
      - OLLAMA_MODELS=${OLLAMA_MODELS:-qwen2.5:3b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling models: ${OLLAMA_MODELS:-qwen2.5:3b}"
        echo "${OLLAMA_MODELS:-qwen2.5:3b}" | tr ',' '\n' | while read model; do
          model=$$(echo "$$model" | tr -d ' ')
          [ -z "$$model" ] && continue
          if ollama list | grep -q "^$$model"; then
            echo "Model $$model already present, skipping."
          else
            echo "Pulling $$model..."
            ollama pull "$$model"
          fi
        done
        echo "Model setup complete!"
    restart: "no"

  # ============================================
  # NOTIFICATIONS - Redis + Notifier + Telegram (Optional)
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: allerac-redis
    restart: unless-stopped
    profiles:
      - notifications
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  notifier:
    build:
      context: ./infra/notifier
      dockerfile: Dockerfile
    container_name: allerac-notifier
    restart: unless-stopped
    profiles:
      - notifications
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-allerac}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - NOTIFIER_LLM_MODEL=${NOTIFIER_LLM_MODEL:-qwen2.5:3b}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 128M

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    container_name: allerac-telegram
    restart: unless-stopped
    profiles:
      - notifications
    volumes:
      - ./telegram-bots.json:/app/telegram-bots.json:ro
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-allerac}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - TELEGRAM_TOKEN_ENCRYPTION_KEY=${TELEGRAM_TOKEN_ENCRYPTION_KEY:-}
      # Legacy env vars (for backward compatibility with single-bot mode)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_DEFAULT_USER=${TELEGRAM_DEFAULT_USER:-}
      # Executor service for shell tool
      - EXECUTOR_URL=http://executor:3001
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrations:
        condition: service_completed_successfully
      executor:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================
  # MONITORING (Optional)
  # ============================================

  node-exporter:
    image: prom/node-exporter:latest
    container_name: allerac-node-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:latest
    container_name: allerac-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: allerac-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      # Only mount Prometheus datasource — Loki not available in local stack
      - ./infra/monitoring/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  db_data:
    name: allerac_db_data
  ollama_data:
    name: allerac_ollama_data
  backups_data:
    name: allerac_backups_data
  redis_data:
    name: allerac_redis_data
  prometheus_data:
    name: allerac_prometheus_data
  grafana_data:
    name: allerac_grafana_data
