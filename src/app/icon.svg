<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Dark rounded-square container -->
  <rect width="512" height="512" rx="96" fill="#0d0d0d"/>

  <!-- "A" lettermark — white -->
  <path d="M64 430 L180 80 L296 430"
        stroke="#ffffff" stroke-width="56"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- A crossbar — brand green -->
  <line x1="114" y1="280" x2="246" y2="280"
        stroke="#39d353" stroke-width="50"
        stroke-linecap="round"/>

  <!-- "LL" from Allerac — two upright strokes, visually echoing "AI" — white -->
  <line x1="370" y1="110" x2="370" y2="430"
        stroke="#ffffff" stroke-width="44"
        stroke-linecap="round"/>
  <line x1="450" y1="110" x2="450" y2="430"
        stroke="#ffffff" stroke-width="44"
        stroke-linecap="round"/>

  <!-- Online / active indicator — top-right corner -->
  <circle cx="460" cy="56" r="30" fill="#39d353"/>
</svg>
