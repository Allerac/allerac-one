<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <clipPath id="icon-clip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <!-- Icon mark (200×200) — always with gradient -->
  <rect width="200" height="200" rx="100" fill="url(#bg)"/>
  <text x="100" y="100"
        font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif"
        font-weight="700"
        font-size="155"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="central"
        clip-path="url(#icon-clip)">A</text>
  <!-- Wordmark -->
  <text x="232" y="100"
        font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif"
        font-weight="700"
        font-size="120"
        letter-spacing="1"
        fill="#ffffff"
        dominant-baseline="central">Allerac</text>
</svg>
