      required: [title, url, content]
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        content:
          type: string
        score:
          type: number
    EmailMessageListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [messages]
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/EmailSummary"
    EmailMessageResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [message]
          properties:
            message:
              $ref: "#/components/schemas/EmailDetail"
    SendEmailResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [sent]
          properties:
            sent:
              type: boolean
              const: true
    SendEmailRequest:
      type: object
      required: [accountId, to, subject, body]
      properties:
        accountId:
          type: string
        to:
          type: string
        subject:
          type: string
        body:
          type: string
        inReplyTo:
          type: string
        references:
          type: string
    EmailSummary:
      type: object
      required: [uid, messageId, subject, from, fromName, date, snippet, seen]
      properties:
        uid:
          type: integer
        messageId:
          type: string
        subject:
          type: string
        from:
          type: string
        fromName:
          type: string
        date:
          type: string
        snippet:
          type: string
        seen:
          type: boolean
    EmailDetail:
      allOf:
        - $ref: "#/components/schemas/EmailSummary"
        - type: object
          required: [to, cc, bodyText, bodyHtml]
          properties:
            to:
              type: string
            cc:
              type: string
            bodyText:
              type: string
            bodyHtml:
              type: string
    FinanceQuotesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [quotes]
          properties:
            quotes:
              type: array
              items:
                $ref: "#/components/schemas/FinanceQuote"
    FinanceSymbolSearchResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [result]
          properties:
            result:
              type: array
              items:
                $ref: "#/components/schemas/FinanceSymbolSearchResult"
    FinanceCandlesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [candles]
          properties:
            candles:
              type: array
              items:
                $ref: "#/components/schemas/FinanceCandle"
    FinanceQuote:
      type: object
      required: [symbol]
      properties:
        symbol:
          type: string
        name:
          type: string
        c:
          type: number
          description: Current price
        d:
          type: number
          description: Absolute change versus previous close
        dp:
          type: number
          description: Percent change versus previous close
        error:
          type: boolean
    FinanceSymbolSearchResult:
      type: object
      required: [symbol, displaySymbol, description, type]
      properties:
        symbol:
          type: string
        displaySymbol:
          type: string
        description:
          type: string
        type:
          type: string
    FinanceCandle:
      type: object
      required: [t, c]
      properties:
        t:
          type: integer
          description: Unix timestamp in milliseconds
        c:
          type: number
          description: Close price
    WatchlistResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [symbols]
          properties:
            symbols:
              type: array
              items:
                type: string
    WatchlistSymbolResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [symbol]
          properties:
            symbol:
              type: string
            added:
              type: boolean
            deleted:
              type: boolean
    AddWatchlistSymbolRequest:
      type: object
      required: [symbol]
      properties:
        symbol:
          type: string
          minLength: 1
    SpeechRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 4096
        voice:
          type: string
          minLength: 1
          maxLength: 80
        model:
          type: string
          minLength: 1
          maxLength: 120
        speed:
          type: number
          minimum: 0.25
          maximum: 4
    RobotSpeechSettings:
      type: object
      required: [voice, speed, style]
      properties:
        voice:
          type: string
        speed:
          type: number
          minimum: 0.25
          maximum: 4
        style:
          type: string
    RobotSettingsUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/RobotSpeechSettings"
    RobotSettingsUpdateResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/RobotSpeechSettings"
    RobotSettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          allOf:
            - $ref: "#/components/schemas/RobotSpeechSettings"
            - type: object
              required: [voices, defaultSkill, tools]
              properties:
                voices:
                  type: array
                  items:
                    type: string
                defaultSkill:
                  oneOf:
                    - $ref: "#/components/schemas/RobotDefaultSkill"
                    - type: "null"
                tools:
                  type: array
                  items:
                    $ref: "#/components/schemas/RobotTool"
    RobotDefaultSkill:
      type: object
      required: [id, name, displayName]
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          type: string
    RobotTool:
      type: object
      required: [name, label, description, group, runtimeAvailable]
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: string
        group:
          type: string
        runtimeAvailable:
          type: boolean
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              description: Optional validation or diagnostic details.
