openapi: 3.1.0
info:
  title: Allerac Control API
  version: 1.0.0-in-progress
  description: >
    Emerging Control API v1 contract for Allerac One. The current implementation
    supports browser session authentication and bearer API keys.
servers:
  - url: http://localhost:8080
    description: Local Docker deployment
security:
  - sessionCookie: []
  - bearerApiKey: []
tags:
  - name: System
  - name: API Keys
  - name: Tickets
paths:
  /api/v1/me:
    get:
      tags: [System]
      summary: Get current API user
      operationId: getApiMe
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/domains:
    get:
      tags: [System]
      summary: List accessible domains
      operationId: listDomains
      responses:
        "200":
          description: Active domains visible to the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/api-keys:
    get:
      tags: [API Keys]
      summary: List API keys
      operationId: listApiKeys
      responses:
        "200":
          description: API keys owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [API Keys]
      summary: Create API key
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: Created API key. The secret is returned only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke API key
      operationId: revokeApiKey
      parameters:
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/tickets:
    get:
      tags: [Tickets]
      summary: List tickets
      operationId: listTickets
      parameters:
        - $ref: "#/components/parameters/TicketStatus"
        - $ref: "#/components/parameters/TicketType"
        - $ref: "#/components/parameters/PriorityLevel"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Tickets owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Tickets]
      summary: Create ticket
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/tickets/{id}:
    get:
      tags: [Tickets]
      summary: Get ticket
      operationId: getTicket
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket plus event timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Tickets]
      summary: Update ticket
      operationId: updateTicket
      parameters:
        - $ref: "#/components/parameters/TicketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketRequest"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tickets]
      summary: Delete ticket
      operationId: deleteTicket
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTicketResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/tickets/{id}/events:
    get:
      tags: [Tickets]
      summary: List ticket events
      operationId: listTicketEvents
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket event timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketEventsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_token
    bearerApiKey:
      type: http
      scheme: bearer
      description: Control API key using the `alr_live_` token format.
  parameters:
    ApiKeyId:
      name: id
      in: path
      required: true
      schema:
        type: string
    TicketId:
      name: id
      in: path
      required: true
      schema:
        type: string
    TicketStatus:
      name: status
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/TicketStatus"
    TicketType:
      name: type
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/TicketType"
    PriorityLevel:
      name: priorityLevel
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/PriorityLevel"
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
  responses:
    Unauthorized:
      description: No valid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found or not owned by the user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    MeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: "#/components/schemas/ApiUser"
    ApiUser:
      type: object
      required: [id, email, name, isAdmin, authMode]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: [string, "null"]
        isAdmin:
          type: boolean
        authMode:
          type: string
          enum: [session, api_key]
    ApiKeyListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [apiKeys]
          properties:
            apiKeys:
              type: array
              items:
                $ref: "#/components/schemas/ApiKey"
    CreateApiKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        scopes:
          type: array
          items:
            type: string
        expiresAt:
          type: [string, "null"]
          format: date-time
    CreateApiKeyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [apiKey, secret]
          properties:
            apiKey:
              $ref: "#/components/schemas/ApiKey"
            secret:
              type: string
              description: Full API key secret. Returned only once.
    RevokeApiKeyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [revoked]
          properties:
            revoked:
              type: boolean
              const: true
    ApiKey:
      type: object
      required: [id, name, prefix, scopes, lastUsedAt, revokedAt, expiresAt, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        lastUsedAt:
          type: [string, "null"]
          format: date-time
        revokedAt:
          type: [string, "null"]
          format: date-time
        expiresAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
    DomainListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [domains]
          properties:
            domains:
              type: array
              items:
                $ref: "#/components/schemas/Domain"
    Domain:
      type: object
      required: [slug, displayName, isActive, defaultSkill]
      properties:
        slug:
          type: string
        displayName:
          type: string
        isActive:
          type: boolean
        defaultSkill:
          anyOf:
            - $ref: "#/components/schemas/DomainDefaultSkill"
            - type: "null"
    DomainDefaultSkill:
      type: object
      required: [id, name, displayName]
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          type: [string, "null"]
    TicketListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [tickets]
          properties:
            tickets:
              type: array
              items:
                $ref: "#/components/schemas/Ticket"
    TicketResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ticket]
          properties:
            ticket:
              $ref: "#/components/schemas/Ticket"
    TicketDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ticket, events]
          properties:
            ticket:
              $ref: "#/components/schemas/Ticket"
            events:
              type: array
              items:
                $ref: "#/components/schemas/TicketEvent"
    TicketEventsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [events]
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/TicketEvent"
    DeleteTicketResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [deleted]
          properties:
            deleted:
              type: boolean
              const: true
    CreateTicketRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        type:
          $ref: "#/components/schemas/TicketType"
        explicitUrgency:
          $ref: "#/components/schemas/PriorityLevel"
        tags:
          type: array
          items:
            type: string
        context:
          type: object
          additionalProperties: true
    UpdateTicketRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/TicketStatus"
        resolutionNotes:
          type: string
        resolvedByType:
          type: string
          enum: [user, agent]
        assignedToType:
          type: [string, "null"]
          enum: [user, agent, null]
        contextPatch:
          type: object
          additionalProperties: true
    Ticket:
      type: object
      required:
        - id
        - number
        - title
        - description
        - type
        - status
        - priority
        - createdBy
        - assignedTo
        - resolvedBy
        - resolutionNotes
        - tags
        - context
        - createdAt
        - updatedAt
        - resolvedAt
        - cancelledAt
      properties:
        id:
          type: string
        number:
          type: integer
        title:
          type: string
        description:
          type: [string, "null"]
        type:
          $ref: "#/components/schemas/TicketType"
        status:
          $ref: "#/components/schemas/TicketStatus"
        priority:
          $ref: "#/components/schemas/TicketPriority"
        createdBy:
          $ref: "#/components/schemas/TicketActorRef"
        assignedTo:
          anyOf:
            - $ref: "#/components/schemas/AssignmentRef"
            - type: "null"
        resolvedBy:
          anyOf:
            - $ref: "#/components/schemas/TicketActorRef"
            - type: "null"
        resolutionNotes:
          type: [string, "null"]
        tags:
          type: array
          items:
            type: string
        context:
          type: [object, "null"]
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, "null"]
          format: date-time
        cancelledAt:
          type: [string, "null"]
          format: date-time
    TicketEvent:
      type: object
      required:
        - id
        - ticketId
        - type
        - actor
        - previousValue
        - newValue
        - notes
        - createdAt
      properties:
        id:
          type: string
        ticketId:
          type: string
        type:
          type: string
          examples: [created, status_changed, resolved, deleted]
        actor:
          $ref: "#/components/schemas/EventActorRef"
        previousValue:
          type: [object, "null"]
          additionalProperties: true
        newValue:
          type: [object, "null"]
          additionalProperties: true
        notes:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
    TicketPriority:
      type: object
      required: [level, score, factors]
      properties:
        level:
          $ref: "#/components/schemas/PriorityLevel"
        score:
          type: integer
        factors:
          type: [object, "null"]
          additionalProperties: true
    TicketActorRef:
      type: object
      required: [type, runId]
      properties:
        type:
          type: string
          enum: [user, agent]
        runId:
          type: [string, "null"]
    AssignmentRef:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [user, agent]
    EventActorRef:
      type: object
      required: [type, runId]
      properties:
        type:
          type: string
          enum: [user, agent, system]
        runId:
          type: [string, "null"]
    TicketStatus:
      type: string
      enum: [open, in_progress, resolved, cancelled]
    TicketType:
      type: string
      enum: [task, bug, improvement, question]
    PriorityLevel:
      type: string
      enum: [low, medium, high, critical]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              description: Optional validation or diagnostic details.
