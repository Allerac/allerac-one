        "200":
          description: Model catalog and provider availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkModelListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/benchmark/runs:
    get:
      tags: [Benchmark]
      summary: List benchmark runs owned by the authenticated user
      operationId: listBenchmarkRuns
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
      responses:
        "200":
          description: Benchmark history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkRunListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Benchmark]
      summary: Run the standard benchmark suite
      operationId: runBenchmark
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BenchmarkRunRequest"
      responses:
        "200":
          description: Server-sent event stream containing benchmark progress and results
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Selected provider is not configured
        "429":
          description: Benchmark concurrency limit reached
    delete:
      tags: [Benchmark]
      summary: Delete all benchmark history owned by the authenticated user
      operationId: clearBenchmarkRuns
      responses:
        "200":
          description: History deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_token
    bearerApiKey:
      type: http
      scheme: bearer
      description: Control API key using the `alr_live_` token format.
  parameters:
    ApiKeyId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: id
      in: path
      required: true
      schema:
        type: string
    MemoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
    TicketId:
      name: id
      in: path
      required: true
      schema:
        type: string
    AgentRunId:
      name: id
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: string
    NoteId:
      name: id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: id
      in: path
      required: true
      schema:
        type: string
    SkillId:
      name: id
      in: path
      required: true
      schema:
        type: string
    TicketStatus:
      name: status
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/TicketStatus"
    TicketType:
      name: type
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/TicketType"
    PriorityLevel:
      name: priorityLevel
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/PriorityLevel"
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
  responses:
    Unauthorized:
      description: No valid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found or not owned by the user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Request is valid but cannot be processed in the current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    VersionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [release, commit, builtAt]
          properties:
            release:
              type: string
            commit:
              type: string
            builtAt:
              type: string
    MeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: "#/components/schemas/ApiUser"
    ApiUser:
      type: object
      required: [id, email, name, isAdmin, authMode]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: [string, "null"]
        isAdmin:
          type: boolean
        authMode:
          type: string
          enum: [session, api_key]
    CapabilitiesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [capabilities, defaults]
          properties:
            capabilities:
              $ref: "#/components/schemas/CapabilityMap"
            defaults:
              type: object
              required: [chatModel]
              properties:
                chatModel:
                  type: [string, "null"]
    CapabilityMap:
      type: object
      required: [llm, search, notifications, storage, social, email, health]
      properties:
        llm:
          type: object
          required: [github, gemini, anthropic, ollama]
          properties:
            github:
              $ref: "#/components/schemas/CapabilityStatus"
            gemini:
              $ref: "#/components/schemas/CapabilityStatus"
            anthropic:
              $ref: "#/components/schemas/CapabilityStatus"
            ollama:
              $ref: "#/components/schemas/CapabilityStatus"
        search:
          type: object
          required: [tavily]
          properties:
            tavily:
              $ref: "#/components/schemas/CapabilityStatus"
        notifications:
          type: object
          required: [telegram, resend]
          properties:
            telegram:
              $ref: "#/components/schemas/CapabilityStatus"
            resend:
              $ref: "#/components/schemas/CapabilityStatus"
        storage:
          type: object
          required: [azureBlob]
          properties:
            azureBlob:
              $ref: "#/components/schemas/CapabilityStatus"
        social:
          type: object
          required: [instagram, tiktok]
          properties:
            instagram:
              $ref: "#/components/schemas/CapabilityStatus"
            tiktok:
              $ref: "#/components/schemas/CapabilityStatus"
        email:
          type: object
          required: [imap, smtp]
          properties:
            imap:
              $ref: "#/components/schemas/CapabilityStatus"
            smtp:
              $ref: "#/components/schemas/CapabilityStatus"
        health:
          type: object
          required: [garmin]
          properties:
            garmin:
              $ref: "#/components/schemas/CapabilityStatus"
    CapabilityStatus:
      type: object
      required: [configured, available]
      properties:
        configured:
          type: boolean
        available:
          type: boolean
        connected:
          type: boolean
    ApiKeyListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [apiKeys]
          properties:
            apiKeys:
              type: array
              items:
                $ref: "#/components/schemas/ApiKey"
    CreateApiKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        scopes:
          type: array
          items:
            type: string
        expiresAt:
          type: [string, "null"]
          format: date-time
    CreateApiKeyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [apiKey, secret]
          properties:
            apiKey:
              $ref: "#/components/schemas/ApiKey"
            secret:
              type: string
              description: Full API key secret. Returned only once.
    RevokeApiKeyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [revoked]
          properties:
            revoked:
              type: boolean
              const: true
    ApiKey:
      type: object
      required: [id, name, prefix, scopes, lastUsedAt, revokedAt, expiresAt, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        lastUsedAt:
          type: [string, "null"]
          format: date-time
        revokedAt:
          type: [string, "null"]
          format: date-time
        expiresAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
    DomainListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [domains]
          properties:
            domains:
              type: array
              items:
                $ref: "#/components/schemas/Domain"
    Domain:
      type: object
      required: [slug, displayName, isActive, defaultSkill]
      properties:
        slug:
          type: string
        displayName:
          type: string
        isActive:
          type: boolean
        defaultSkill:
          anyOf:
            - $ref: "#/components/schemas/DomainDefaultSkill"
            - type: "null"
    DomainDefaultSkill:
      type: object
      required: [id, name, displayName]
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          type: [string, "null"]
    ConversationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [conversations]
          properties:
            conversations:
              type: array
              items:
                $ref: "#/components/schemas/Conversation"
    ConversationResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [conversation]
          properties:
            conversation:
              $ref: "#/components/schemas/Conversation"
    ConversationMessagesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [messages]
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/ConversationMessage"
    SendConversationMessageRequest:
      type: object
      required: [model, provider]
      properties:
        message:
          type: string
          maxLength: 100000
        model:
          type: string
          minLength: 1
          maxLength: 200
        provider:
          type: string
          enum: [github, ollama, gemini, anthropic]
        imageAttachments:
          type: array
          maxItems: 5
          items:
            type: object
            required: [url]
            properties:
              url:
                type: string
                maxLength: 8388608
                description: Must be a data:image/* URL or https URL.
        preSelectedSkillId:
          type: string
          format: uuid
        defaultSkillName:
          type: string
        postContext:
          type: string
          maxLength: 20000
      anyOf:
        - required: [message]
        - required: [imageAttachments]
    SendConversationMessageResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [message, events]
          properties:
            message:
              type: object
              required: [conversationId, role, content]
              properties:
                conversationId:
                  type: string
                role:
                  type: string
                  const: assistant
                content:
                  type: string
            events:
              type: array
              items:
                $ref: "#/components/schemas/ChatExecutionEvent"
    ChatExecutionEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          examples: [token, tool_call, tool_result, skill_activated]
      additionalProperties: true
    CreateConversationRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        domainSlug:
          type: string
    Conversation:
      type: object
      required: [id, title, domainSlug, pinned, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        domainSlug:
          type: [string, "null"]
        pinned:
          type: boolean
        createdAt:
          type: [string, "null"]
