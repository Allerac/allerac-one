openapi: 3.1.0
info:
  title: Allerac Control API
  version: 1.0.0-beta
  description: >
    Control API v1 beta contract for Allerac One. The current implementation supports
    browser session authentication and bearer API keys. The version endpoint is
    intentionally public for deployment verification.
servers:
  - url: http://localhost:8080
    description: Local Docker deployment
security:
  - sessionCookie: []
  - bearerApiKey: []
tags:
  - name: System
  - name: Capabilities
  - name: API Keys
  - name: Conversations
  - name: Memories
  - name: Tickets
  - name: Agent Runs
  - name: Documents
  - name: Notes
  - name: Scheduled Jobs
  - name: Skills
  - name: Health
  - name: Search
  - name: Robot
  - name: Email
  - name: Finance
  - name: Benchmark
paths:
  /api/v1/version:
    get:
      tags: [System]
      summary: Get deployed release identity
      operationId: getApiVersion
      security: []
      responses:
        "200":
          description: Release and build identity served by this application instance
          headers:
            Cache-Control:
              schema:
                type: string
                const: no-store, max-age=0
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /api/v1/me:
    get:
      tags: [System]
      summary: Get current API user
      operationId: getApiMe
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/domains:
    get:
      tags: [System]
      summary: List accessible domains
      operationId: listDomains
      responses:
        "200":
          description: Active domains visible to the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/capabilities:
    get:
      tags: [Capabilities]
      summary: Get effective capabilities
      operationId: getCapabilities
      description: Returns safe availability metadata for integrations and providers visible to the authenticated user. Secrets are never returned.
      responses:
        "200":
          description: Effective capability map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/api-keys:
    get:
      tags: [API Keys]
      summary: List API keys
      operationId: listApiKeys
      responses:
        "200":
          description: API keys owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [API Keys]
      summary: Create API key
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: Created API key. The secret is returned only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke API key
      operationId: revokeApiKey
      parameters:
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/conversations:
    get:
      tags: [Conversations]
      summary: List conversations
      operationId: listConversations
      parameters:
        - name: domainSlug
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Conversations owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Conversations]
      summary: Create conversation
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/conversations/{id}/messages:
    get:
      tags: [Conversations]
      summary: List conversation messages
      operationId: listConversationMessages
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Messages in an owned conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationMessagesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Conversations]
      summary: Send conversation message
      description: Sends a user message and returns the final assistant response synchronously.
      operationId: sendConversationMessage
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendConversationMessageRequest"
      responses:
        "201":
          description: Assistant response generated and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendConversationMessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          description: Chat rate or concurrency limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/conversations/{id}/memory:
    post:
      tags: [Memories]
      summary: Create memory from conversation
      operationId: createConversationMemory
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationMemoryRequest"
      responses:
        "201":
          description: Created or refreshed conversation memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v1/memories:
    get:
      tags: [Memories]
      summary: List memories
      operationId: listMemories
      parameters:
        - name: domainSlug
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - name: minImportance
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10
      responses:
        "200":
          description: Memories owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/memories/{id}:
    delete:
      tags: [Memories]
      summary: Delete memory
      operationId: deleteMemory
      parameters:
        - $ref: "#/components/parameters/MemoryId"
      responses:
        "200":
          description: Memory deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMemoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/tickets:
    get:
      tags: [Tickets]
      summary: List tickets
      operationId: listTickets
      parameters:
        - $ref: "#/components/parameters/TicketStatus"
        - $ref: "#/components/parameters/TicketType"
        - $ref: "#/components/parameters/PriorityLevel"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Tickets owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Tickets]
      summary: Create ticket
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/tickets/{id}:
    get:
      tags: [Tickets]
      summary: Get ticket
      operationId: getTicket
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket plus event timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Tickets]
      summary: Update ticket
      operationId: updateTicket
      parameters:
        - $ref: "#/components/parameters/TicketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketRequest"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tickets]
      summary: Delete ticket
      operationId: deleteTicket
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTicketResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/tickets/{id}/events:
    get:
      tags: [Tickets]
      summary: List ticket events
      operationId: listTicketEvents
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket event timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketEventsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/agent-runs:
    get:
      tags: [Agent Runs]
      summary: List agent runs
      operationId: listAgentRuns
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Agent runs owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Agent Runs]
      summary: Create agent run
      operationId: createAgentRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRunRequest"
      responses:
        "201":
          description: Created pending agent run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/agent-runs/{id}:
    get:
      tags: [Agent Runs]
      summary: Get agent run
      operationId: getAgentRun
      parameters:
        - $ref: "#/components/parameters/AgentRunId"
      responses:
        "200":
          description: Agent run with worker status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/agent-runs/{id}/cancel:
    post:
      tags: [Agent Runs]
      summary: Cancel agent run
      operationId: cancelAgentRun
      parameters:
        - $ref: "#/components/parameters/AgentRunId"
      responses:
        "200":
          description: Agent run cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAgentRunResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/documents:
    get:
      tags: [Documents]
      summary: List documents
      operationId: listDocuments
      parameters:
        - name: domainSlug
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Documents owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Documents]
      summary: Upload document
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Max 20 MB
                domainSlug:
                  type: string
      responses:
        "201":
          description: Document created, processing in background
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/documents/{id}:
    delete:
      tags: [Documents]
      summary: Delete document
      operationId: deleteDocument
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document and all chunks deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/notes:
    get:
      tags: [Notes]
      summary: List notes
      operationId: listNotes
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: due_on
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: due_before
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: overdue
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Notes owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Notes]
      summary: Create note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/notes/search:
    get:
      tags: [Notes]
      summary: Search notes
      operationId: searchNotes
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Matching notes ranked by relevance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteSearchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/notes/tags:
    get:
      tags: [Notes]
      summary: List note tags
      operationId: listNoteTags
      responses:
        "200":
          description: All distinct tags used in the user's notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteTagsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/notes/{id}:
    patch:
      tags: [Notes]
      summary: Update note
      operationId: updateNote
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Notes]
      summary: Delete note
      operationId: deleteNote
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/jobs:
    get:
      tags: [Scheduled Jobs]
      summary: List scheduled jobs
      operationId: listJobs
      responses:
        "200":
          description: Scheduled jobs owned by the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Scheduled Jobs]
      summary: Create scheduled job
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Created scheduled job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/jobs/{id}:
    patch:
      tags: [Scheduled Jobs]
      summary: Update scheduled job
      operationId: updateJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobRequest"
      responses:
        "200":
          description: Updated scheduled job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Scheduled Jobs]
      summary: Delete scheduled job
      operationId: deleteJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job and execution history deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/jobs/{id}/toggle:
    post:
      tags: [Scheduled Jobs]
      summary: Toggle job enabled state
      operationId: toggleJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Updated job with toggled enabled state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/jobs/{id}/run:
    post:
      tags: [Scheduled Jobs]
      summary: Run scheduled job now
      operationId: runJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "201":
          description: Job executed immediately and execution record returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobExecutionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/jobs/{id}/executions:
    get:
      tags: [Scheduled Jobs]
      summary: List job executions
      operationId: listJobExecutions
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Execution history for the job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobExecutionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/skills:
    get:
      tags: [Skills]
      summary: List skills
      operationId: listSkills
      responses:
        "200":
          description: Skills available to the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Skills]
      summary: Create skill
      operationId: createSkill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillRequest"
      responses:
        "201":
          description: Created skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/skills/{id}:
    get:
      tags: [Skills]
      summary: Get skill
