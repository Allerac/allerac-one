# Allerac One - Unified Deployment
# Works for both self-hosted (local) and cloud deployments
#
# Usage:
#   docker compose up -d
#
# With GPU support (NVIDIA):
#   OLLAMA_RUNTIME=nvidia docker compose up -d
#
# With optional profiles:
#   docker compose --profile tunnel up -d           # Enable Cloudflare Tunnel
#   docker compose --profile webhook up -d          # Enable webhook auto-deploy
#
# Required environment variables:
#   ENCRYPTION_KEY                   - AES key for token encryption
#   TELEGRAM_TOKEN_ENCRYPTION_KEY    - AES key for Telegram token encryption
#
# Optional (but useful for cloud/tunnel access):
#   TUNNEL_TOKEN                     - Cloudflare Tunnel token (for remote access)
#   GRAFANA_PASSWORD                 - Grafana admin password (defaults to 'admin')
#   WEBHOOK_SECRET                   - Webhook secret (for auto-deploy)
#   GITHUB_TOKEN                     - GitHub Models API token
#   TAVILY_API_KEY                   - Web search API key
#   OLLAMA_MODELS                    - Comma-separated models to download
#   OLLAMA_RUNTIME                   - Docker runtime for Ollama (runc or nvidia; default: runc)
#
# All services enabled by default:
# - Core: app, db, executor, health-worker, ollama
# - Monitoring: prometheus, grafana, loki, promtail, node-exporter
# - Notifications: redis, notifier, telegram-bot
# - Management: portainer
# - Tunnel: cloudflare tunnel (optional, requires TUNNEL_TOKEN)
# - Webhooks: auto-deploy on git push (optional, requires WEBHOOK_SECRET)

name: allerac

services:
  # ============================================
  # Database
  # ============================================

  db:
    image: pgvector/pgvector:pg16
    container_name: allerac-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-allerac}
    volumes:
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-allerac}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  migrations:
    image: postgres:16-alpine
    container_name: allerac-migrations
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-allerac}
    volumes:
      - ./src/database:/database
    command: ["/bin/sh", "/database/run-migrations.sh"]
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # Core Services
  # ============================================

  executor:
    build:
      context: ./infra/executor
      dockerfile: Dockerfile
    container_name: allerac-executor
    restart: unless-stopped
    environment:
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
      - DEFAULT_CWD=/workspace
      - ALLERAC_PRODUCT_LINE=${ALLERAC_PRODUCT_LINE:-local}
    volumes:
      # For local: host bind mount; for cloud: docker volume
      - ${HOST_WORKSPACE:-/home}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_DIR:-.}:/project
    ports:
      - "3000:3000"
      - "3002-3010:3002-3010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  health-worker:
    build:
      context: ./services/health-worker
      dockerfile: Dockerfile
    container_name: allerac-health-worker
    restart: unless-stopped
    environment:
      - HEALTH_WORKER_SECRET=${HEALTH_WORKER_SECRET:-}
      - PORT=8001
      - AUTH_WORKER_URL=${AUTH_WORKER_URL:-}
      - AUTH_WORKER_SECRET=${AUTH_WORKER_SECRET:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMMIT_HASH: ${COMMIT_HASH:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        NEXT_PUBLIC_VISIBLE_DOMAINS: ${NEXT_PUBLIC_VISIBLE_DOMAINS:-}
    container_name: allerac-app
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-allerac}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-allerac}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      - NEXT_PUBLIC_VISIBLE_DOMAINS=${NEXT_PUBLIC_VISIBLE_DOMAINS:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BACKUP_DIR=/app/backups
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - EXECUTOR_URL=http://executor:3001
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
      - HEALTH_WORKER_URL=${HEALTH_WORKER_URL:-http://health-worker:8001}
      - HEALTH_WORKER_SECRET=${HEALTH_WORKER_SECRET:-}
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      - INSTAGRAM_REDIRECT_URI=${INSTAGRAM_REDIRECT_URI:-}
      - INSTAGRAM_CONFIG_ID=${INSTAGRAM_CONFIG_ID:-}
      - INSTAGRAM_WEBHOOK_VERIFY_TOKEN=${INSTAGRAM_WEBHOOK_VERIFY_TOKEN:-allerac-ig-webhook}
      - INSTAGRAM_BOT_SYSTEM_PROMPT=${INSTAGRAM_BOT_SYSTEM_PROMPT:-}
      - AZURE_STORAGE_ACCOUNT_NAME=${AZURE_STORAGE_ACCOUNT_NAME:-}
      - AZURE_STORAGE_CONTAINER_NAME=${AZURE_STORAGE_CONTAINER_NAME:-}
      - AZURE_STORAGE_ACCOUNT_KEY=${AZURE_STORAGE_ACCOUNT_KEY:-}
      - ALLERAC_PRODUCT_LINE=${ALLERAC_PRODUCT_LINE:-local}
      # OIDC Identity Provider (optional)
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_JWKS_JSON=${OIDC_JWKS_JSON:-}
      - OIDC_COOKIE_SECRET=${OIDC_COOKIE_SECRET:-}
      - OIDC_CLIENT_SECRET_CRAWLER=${OIDC_CLIENT_SECRET_CRAWLER:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - backups_data:/app/backups
      - ./update.sh:/app/update.sh:ro
      - ./skills:/app/skills
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrations:
        condition: service_completed_successfully
      executor:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # LLM - Ollama (Local AI)
  # ============================================

  ollama:
    image: ollama/ollama:latest
    pull_policy: if_not_present
    container_name: allerac-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=1h
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-3}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-}
    mem_limit: ${OLLAMA_MEM_LIMIT:-10g}
    runtime: ${OLLAMA_RUNTIME:-runc}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

  ollama-setup:
    image: ollama/ollama:latest
    pull_policy: if_not_present
    container_name: allerac-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_MODELS=${OLLAMA_MODELS:-qwen2.5:3b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling models: ${OLLAMA_MODELS:-qwen2.5:3b}"
        echo "${OLLAMA_MODELS:-qwen2.5:3b}" | tr ',' '\n' | while read model; do
          model=$$(echo "$$model" | tr -d ' ')
          [ -z "$$model" ] && continue
          if ollama list | grep -q "^$$model"; then
            echo "Model $$model already present, skipping."
          else
            echo "Pulling $$model..."
            ollama pull "$$model"
          fi
        done
        echo "Model setup complete!"
    restart: "no"

  # ============================================
  # Monitoring Stack
  # ============================================

  node-exporter:
    image: prom/node-exporter:latest
    container_name: allerac-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:latest
    container_name: allerac-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 256M

  loki:
    image: grafana/loki:latest
    container_name: allerac-loki
    restart: unless-stopped
    user: "0"
    volumes:
      - ./infra/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 256M

  promtail:
    image: grafana/promtail:latest
    container_name: allerac-promtail
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: allerac-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================
  # Notifications
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: allerac-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  notifier:
    build:
      context: ./infra/notifier
      dockerfile: Dockerfile
    container_name: allerac-notifier
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-allerac}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - NOTIFIER_LLM_MODEL=${NOTIFIER_LLM_MODEL:-qwen2.5:3b}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 128M

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    container_name: allerac-telegram
    restart: unless-stopped
    volumes:
      - ./telegram-bots.json:/app/telegram-bots.json:ro
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-allerac}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - TELEGRAM_TOKEN_ENCRYPTION_KEY=${TELEGRAM_TOKEN_ENCRYPTION_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_DEFAULT_USER=${TELEGRAM_DEFAULT_USER:-}
      - EXECUTOR_URL=http://executor:3001
      - EXECUTOR_SECRET=${EXECUTOR_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrations:
        condition: service_completed_successfully
      executor:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================
  # Management & Optional
  # ============================================

  portainer:
    image: portainer/portainer-ce:latest
    container_name: allerac-portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9000:9000"

  # Cloudflare Tunnel - Optional, requires TUNNEL_TOKEN
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: allerac-tunnel
    restart: unless-stopped
    command: tunnel run
    network_mode: host
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    depends_on:
      - app
    profiles:
      - tunnel

  # Webhook - Optional, requires WEBHOOK_SECRET
  webhook:
    build:
      context: ./infra/webhook
      dockerfile: Dockerfile
    container_name: allerac-webhook
    restart: unless-stopped
    ports:
      - "9999:9000"
    volumes:
      - ./infra/webhook:/etc/webhook:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_DIR:-.}:/project
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - TELEGRAM_DEPLOY_BOT_TOKEN=${TELEGRAM_DEPLOY_BOT_TOKEN:-}
      - TELEGRAM_DEPLOY_CHAT_ID=${TELEGRAM_DEPLOY_CHAT_ID:-}
      - GITHUB_DEPLOY_TOKEN=${GITHUB_DEPLOY_TOKEN:-}
      - DEPLOY_VM_NAME=${DEPLOY_VM_NAME:-allerac-vm}
    deploy:
      resources:
        limits:
          memory: 128M
    profiles:
      - webhook

volumes:
  db_data:
    name: allerac_db_data
  ollama_data:
    name: allerac_ollama_data
  backups_data:
    name: allerac_backups_data
  redis_data:
    name: allerac_redis_data
  prometheus_data:
    name: allerac_prometheus_data
  grafana_data:
    name: allerac_grafana_data
  loki_data:
    name: allerac_loki_data
  portainer_data:
    name: allerac_portainer_data
